<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DNS Guard | Advanced Domain Intelligence</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0d1117;
      --panel-bg: rgba(22, 27, 34, 0.7);
      --border-color: rgba(48, 54, 61, 0.8);
      --primary: #58a6ff;
      --primary-hover: #3182ce;
      --text-main: #c9d1d9;
      --text-muted: #8b949e;
      --trusted: #2ea043;
      --untrusted: #da3633;
      --unknown: #6e7681;
      --glass-blur: blur(12px);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      background-image: radial-gradient(circle at 50% 0%, #1f2937 0%, transparent 50%),
        radial-gradient(circle at 10% 90%, rgba(31, 41, 55, 0.5) 0%, transparent 40%);
      background-attachment: fixed;
      color: var(--text-main);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      line-height: 1.6;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
      animation: fadeInDown 0.8s ease-out;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #58a6ff 0%, #ffffff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .card {
      background: var(--panel-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      animation: fadeInUp 0.5s ease-out both;
    }

    .search-box {
      display: flex;
      gap: 12px;
      margin-bottom: 10px;
    }

    input {
      flex: 1;
      background: rgba(13, 17, 23, 0.8);
      border: 1px solid var(--border-color);
      color: #fff;
      padding: 14px 18px;
      border-radius: 8px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s ease;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.2);
    }

    button {
      background: var(--primary);
      color: #ffffff;
      border: none;
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-main);
      width: 100%;
      margin-top: 20px;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--text-muted);
    }

    /* Result Container */
    #result {
      margin-top: 24px;
      display: none;
      /* hidden initially */
      animation: fadeIn 0.4s ease-out;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    .status-badge.TRUSTED {
      background: rgba(46, 160, 67, 0.15);
      color: #3fb950;
      border: 1px solid rgba(46, 160, 67, 0.4);
    }

    .status-badge.UNTRUSTED {
      background: rgba(218, 54, 51, 0.15);
      color: #ff7b72;
      border: 1px solid rgba(218, 54, 51, 0.4);
    }

    .status-badge.UNKNOWN {
      background: rgba(110, 118, 129, 0.15);
      color: #8b949e;
      border: 1px solid rgba(110, 118, 129, 0.4);
    }

    .trust-score-container {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 20px;
    }

    .trust-score {
      font-size: 3.5rem;
      font-weight: 700;
      color: #ffffff;
      line-height: 1;
    }

    .trust-score-max {
      font-size: 1.2rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .score-gauge {
      width: 100%;
      height: 10px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      overflow: hidden;
      margin-top: 10px;
    }

    #scoreBar {
      height: 100%;
      width: 0%;
      transition: width 0.5s ease;
    }

    .penalty-list {
      list-style: none;
      margin: 16px 0;
      padding: 0;
      background: rgba(218, 54, 51, 0.05);
      border-left: 3px solid var(--untrusted);
      border-radius: 0 6px 6px 0;
      padding: 12px 16px;
    }

    .penalty-item {
      color: #ff7b72;
      font-size: 0.9rem;
      margin-bottom: 6px;
      display: flex;
      gap: 8px;
    }

    .penalty-item:last-child {
      margin-bottom: 0;
    }

    .penalty-amount {
      font-weight: 700;
    }

    .stats-footer {
      font-size: 0.85rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border-color);
      padding-top: 16px;
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
    }

    /* Loading State */
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 0;
      text-align: center;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(88, 166, 255, 0.2);
      border-radius: 50%;
      border-top-color: var(--primary);
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 16px;
    }

    .loading-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 8px;
    }

    .loading-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      max-width: 80%;
    }

    /* Timeline */
    #timeline-container {
      display: none;
    }

    .timeline-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 16px;
    }

    .timeline-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: #fff;
    }

    .event-wrapper {
      position: relative;
      padding-left: 30px;
      margin-bottom: 30px;
    }

    .event-wrapper::before {
      content: '';
      position: absolute;
      left: 0;
      top: 6px;
      bottom: -30px;
      width: 2px;
      background: var(--border-color);
    }

    .event-wrapper:last-child::before {
      display: none;
    }

    .event-marker {
      position: absolute;
      left: -5px;
      top: 6px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--bg-color);
      border: 2px solid var(--primary);
    }

    .event-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .event-type {
      font-weight: 600;
      color: #fff;
      font-size: 1.05rem;
    }

    .event-date {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .event-hash {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.8rem;
      color: var(--text-muted);
      background: rgba(0, 0, 0, 0.3);
      padding: 4px 8px;
      border-radius: 4px;
      display: inline-block;
      margin-bottom: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .event-metadata {
      background: rgba(13, 17, 23, 0.8);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 12px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.85rem;
      color: #a5d6ff;
      overflow-x: auto;
      margin-bottom: 12px;
    }

    .blockchain-proof {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(46, 160, 67, 0.05);
      border: 1px solid rgba(46, 160, 67, 0.2);
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
    }

    .proof-queued {
      background: rgba(210, 153, 34, 0.05);
      border: 1px solid rgba(210, 153, 34, 0.2);
      color: #d29922;
    }

    .proof-icon {
      font-size: 1.2rem;
    }

    .proof-details {
      flex: 1;
      overflow: hidden;
    }

    .proof-tx {
      font-family: monospace;
      color: #58a6ff;
      text-decoration: none;
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .proof-tx:hover {
      text-decoration: underline;
    }

    /* Animations */
    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-15px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>DNS Guard</h1>
      <div class="subtitle">Production Intelligence & Reputation Ledger</div>
    </header>

    <div class="card" style="animation-delay: 0.1s">
      <div class="search-box">
        <input type="text" id="domainInput" placeholder="Enter domain (e.g., google.com)"
          onkeypress="handleKeyPress(event)" autocomplete="off" spellcheck="false" />
        <button onclick="searchDomain()" id="searchBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          Analyze
        </button>
      </div>
    </div>

    <div class="card" id="result-card" style="display: none; animation-delay: 0.2s">
      <div id="result"></div>

      <div id="monitoringPanel"
        style="margin-top:20px; border-top:1px solid var(--border-color); padding-top:16px; display:none;">
        <div style="font-size:0.95rem; color:var(--text-muted); margin-bottom:6px;">Monitoring</div>
        <div id="monitoringStatus" style="margin-bottom:10px;"></div>
        <button id="monitorToggleBtn" class="btn-secondary" onclick="toggleMonitoring()"></button>
      </div>

      <button class="btn-secondary" id="timelineBtn" style="display: none; margin-top: 15px;" onclick="loadTimeline()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
        View Cryptographic Ledger Timeline
      </button>
    </div>

    <div class="card" id="timeline-container" style="animation-delay: 0.3s">
      <div class="timeline-header">
        <div class="timeline-title">Event Ledger</div>
        <div id="timeline-meta" style="font-size: 0.9rem; color: var(--text-muted);"></div>
      </div>
      <div id="timeline"></div>
    </div>
  </div>

  <script src="search.js"></script>
</body>

</html>
